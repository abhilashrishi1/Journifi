  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ---------------------------------------------------------------- */
/* Helpers                                                            */
/* ---------------------------------------------------------------- */

function fmtMoney(n) {
  const sign = n < 0 ? '-' : '+';
  return `${sign}$${Math.abs(n).toFixed(2)}`;
}
function fmtPlain(n) { return `$${Math.abs(n).toFixed(2)}`; }

function shortDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[m - 1]} ${d}`;
}

function computeStats(trades) {
  if (trades.length === 0) {
    return { netPnl: 0, winRate: 0, avgWin: 0, avgLoss: 0, profitFactor: 0, total: 0, wins: 0, losses: 0 };
  }
  const wins = trades.filter((t) => t.pnl > 0);
  const losses = trades.filter((t) => t.pnl < 0);
  const netPnl = trades.reduce((s, t) => s + t.pnl, 0);
  const sumWins = wins.reduce((s, t) => s + t.pnl, 0);
  const sumLosses = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
  return {
    netPnl,
    winRate: (wins.length / trades.length) * 100,
    avgWin: wins.length ? sumWins / wins.length : 0,
    avgLoss: losses.length ? sumLosses / losses.length : 0,
    profitFactor: sumLosses ? sumWins / sumLosses : (sumWins > 0 ? Infinity : 0),
    total: trades.length,
    wins: wins.length,
    losses: losses.length,
  };
}

function groupByDate(trades) {
  const map = {};
  trades.forEach((t) => { map[t.date] = (map[t.date] || 0) + t.pnl; });
  return map;
}

function getInsight(stats) {
  if (stats.total === 0) return 'Log a few trades to start seeing patterns.';
  const pf = stats.profitFactor;
  const wr = stats.winRate;
  if (pf < 1 && wr >= 45) {
    return `Win rate is ${wr.toFixed(0)}% — close to a coin flip but solid. The leak is size: average losses (${fmtPlain(stats.avgLoss)}) are running bigger than average wins (${fmtPlain(stats.avgWin)}). The edge here isn't "be right more often," it's cut losers faster or hold winners a bit longer.`;
  }
  if (pf < 1 && wr < 45) {
    return `Both win rate (${wr.toFixed(0)}%) and reward-to-risk are working against you right now. Worth reviewing entries tagged "FOMO Entry" or "Revenge Trade" first — those usually explain more of the drawdown than the setup itself.`;
  }
  if (pf >= 1 && pf < 1.5) {
    return `Profit factor of ${pf.toFixed(2)} — you're net positive. Small, consistent edge. Tightening the worst-tagged trades further could push this meaningfully higher.`;
  }
  return `Profit factor of ${pf.toFixed(2)} with a ${wr.toFixed(0)}% win rate — this is working. Keep tagging trades so you can see exactly which setup is carrying the period.`;
}

/* ---------------------------------------------------------------- */
/* Cumulative P&L chart (Chart.js)                                    */
/* ---------------------------------------------------------------- */

function CumulativeChart({ data }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map((d) => d.label),
        datasets: [
          {
            label: 'Cumulative P&L',
            data: data.map((d) => d.cum),
            borderColor: C.gold,
            backgroundColor: hexToRgba(C.gold, 0.1),
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            borderWidth: 2,
          },
          {
            label: 'Zero',
            data: data.map(() => 0),
            borderColor: C.inkMuted,
            borderDash: [4, 4],
            borderWidth: 1,
            pointRadius: 0,
            fill: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: C.surfaceAlt,
            titleColor: C.ink,
            bodyColor: C.ink,
            borderColor: C.border,
            borderWidth: 1,
            callbacks: {
              label: (ctx) => ctx.datasetIndex === 0 ? `Cumulative: ${fmtMoney(ctx.raw)}` : null,
            },
            filter: (ctx) => ctx.datasetIndex === 0,
          },
        },
        scales: {
          x: { ticks: { color: C.inkMuted, font: { size: 10 } }, grid: { color: C.border, drawTicks: false } },
          y: { ticks: { color: C.inkMuted, font: { size: 10 }, callback: (v) => `$${v}` }, grid: { color: C.border, drawTicks: false } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);

  return <div style={{ height: 140 }}><canvas ref={canvasRef}></canvas></div>;
}

/* ---------------------------------------------------------------- */
/* Calendar                                                           */
/* ---------------------------------------------------------------- */

function ProfitCalendar({ dailyPnl }) {
  const [month, setMonth] = useState(new Date(2026, 5, 1));
  const year = month.getFullYear();
  const mIdx = month.getMonth();
  const firstDay = new Date(year, mIdx, 1).getDay();
  const daysInMonth = new Date(year, mIdx + 1, 0).getDate();
  const monthLabel = month.toLocaleString('default', { month: 'long', year: 'numeric' });

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const monthlyTotal = Object.entries(dailyPnl)
    .filter(([date]) => {
      const [y, m] = date.split('-').map(Number);
      return y === year && m - 1 === mIdx;
    })
    .reduce((s, [, v]) => s + v, 0);

  return (
    <div style={{ borderRadius: 8, padding: 12, background: C.surface, border: `1px solid ${C.border}` }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
        <button onClick={() => setMonth(new Date(year, mIdx - 1, 1))} style={{ background: 'transparent', border: 'none', color: C.inkMuted, cursor: 'pointer', fontSize: 18, padding: 4 }}>‹</button>
        <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'Fraunces', serif", color: C.ink }}>{monthLabel}</div>
        <button onClick={() => setMonth(new Date(year, mIdx + 1, 1))} style={{ background: 'transparent', border: 'none', color: C.inkMuted, cursor: 'pointer', fontSize: 18, padding: 4 }}>›</button>
      </div>
      <div style={{ fontSize: 12, marginBottom: 8, color: monthlyTotal >= 0 ? C.gain : C.loss, fontFamily: "'IBM Plex Mono', monospace" }}>
        Month total: {fmtMoney(monthlyTotal)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, textAlign: 'center', fontSize: 10, marginBottom: 4, color: C.inkMuted }}>
        {['S','M','T','W','T','F','S'].map((d, i) => <div key={i}>{d}</div>)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const dateStr = `${year}-${String(mIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const pnl = dailyPnl[dateStr];
          let bg = 'transparent';
          if (pnl !== undefined) {
            const abs = Math.abs(pnl);
            const alpha = abs > 80 ? 0.55 : abs > 20 ? 0.32 : 0.16;
            bg = hexToRgba(pnl >= 0 ? C.gain : C.loss, alpha);
          }
          return (
            <div key={i} style={{ aspectRatio: '1', borderRadius: 4, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: bg, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 10, color: C.inkMuted }}>{d}</div>
              {pnl !== undefined && (
                <div style={{ fontSize: 9, fontWeight: 500, fontFamily: "'IBM Plex Mono', monospace", color: pnl >= 0 ? C.gain : C.loss }}>
                  {pnl >= 0 ? '+' : ''}{Math.round(pnl)}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

        Add to journal
      </button>
    </div>
  );
}

function Journifi() {
  const [notes, setNotes] = useState({});
  const [customTrades, setCustomTrades] = useState([]);
  const [expandedId, setExpandedId] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);

  useEffect(() => {
    const data = loadData();
    setNotes(data.notes || {});
    setCustomTrades(data.customTrades || []);
  }, []);

  const allTrades = useMemo(() => {
    return [...SEED_TRADES, ...customTrades].sort((a, b) => (a.date < b.date ? 1 : -1));
  }, [customTrades]);

  const stats = useMemo(() => computeStats(allTrades), [allTrades]);
  const dailyPnl = useMemo(() => groupByDate(allTrades), [allTrades]);

  const chartData = useMemo(() => {
    const dates = Object.keys(dailyPnl).sort();
    let cum = 0;
    return dates.map((d) => {
      cum += dailyPnl[d];
      return { date: d, label: shortDate(d), cum: Math.round(cum * 100) / 100 };
    });
  }, [dailyPnl]);

  const handleNoteChange = (tradeId, nextNote) => {
    const nextNotes = { ...notes, [tradeId]: nextNote };
    setNotes(nextNotes);
    saveData({ notes: nextNotes, customTrades });
  };

  const handleAddTrade = (trade) => {
    const next = [...customTrades, trade];
    setCustomTrades(next);
    saveData({ notes, customTrades: next });
  };

  const range = allTrades.length
    ? `${shortDate(allTrades[allTrades.length - 1].date)} – ${shortDate(allTrades[0].date)}, 2026`
    : '';

  return (
    <div style={{ minHeight: '100vh', width: '100%', background: C.bg, fontFamily: "'IBM Plex Sans', sans-serif" }}>
      <div style={{ maxWidth: 480, margin: '0 auto', padding: '24px 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>

        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
          <CandleIcon />
          <div>
            <div style={{ fontSize: 26, fontWeight: 700, lineHeight: 1.1, fontFamily: "'Fraunces', serif", color: C.ink }}>Journifi</div>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.12em', color: C.gold, fontFamily: "'IBM Plex Mono', monospace" }}>
              Personal Trade Journal · {range}
            </div>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          <StatCard label="Net P&L" value={fmtMoney(stats.netPnl)} valueColor={stats.netPnl >= 0 ? C.gain : C.loss} glyph={stats.netPnl >= 0 ? '↑' : '↓'} sub={`${stats.total} trades`} />
          <StatCard label="Win Rate" value={`${stats.winRate.toFixed(0)}%`} glyph="◎" sub={`${stats.wins}W / ${stats.losses}L`} />
          <StatCard label="Avg Win" value={fmtPlain(stats.avgWin)} valueColor={C.gain} glyph="↑" />
          <StatCard label="Avg Loss" value={fmtPlain(stats.avgLoss)} valueColor={C.loss} glyph="↓" />
          <StatCard label="Profit Factor" value={isFinite(stats.profitFactor) ? stats.profitFactor.toFixed(2) : '∞'} glyph="⚖" />
          <StatCard label="Total Trades" value={stats.total} glyph="#" />
        </div>

        <div style={{ borderRadius: 8, padding: 12, display: 'flex', gap: 8, background: hexToRgba(C.gold, 0.08), border: `1px solid ${hexToRgba(C.gold, 0.3)}` }}>
          <span style={{ color: C.gold, flexShrink: 0 }}>📓</span>
          <div style={{ fontSize: 13, lineHeight: 1.4, color: C.ink }}>{getInsight(stats)}</div>
        </div>

        <div style={{ borderRadius: 8, padding: 12, background: C.surface, border: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8, color: C.inkMuted, fontFamily: "'IBM Plex Mono', monospace" }}>
            Cumulative P&L
          </div>
          <CumulativeChart data={chartData} />
        </div>

        <ProfitCalendar dailyPnl={dailyPnl} />

        <div style={{ borderRadius: 8, padding: 12, background: C.surface, border: `1px solid ${C.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: C.inkMuted, fontFamily: "'IBM Plex Mono', monospace" }}>Trade Log</div>
            <button onClick={() => setShowAddForm((s) => !s)}
              style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: C.gold, background: 'transparent', border: 'none', cursor: 'pointer', fontFamily: "'IBM Plex Mono', monospace" }}>
              + Add
            </button>
          </div>
          {showAddForm && <AddTradeForm onAdd={handleAddTrade} onClose={() => setShowAddForm(false)} />}
          <div>
            {allTrades.map((trade) => (
              <TradeRow key={trade.id} trade={trade} note={notes[trade.id]}
                expanded={expandedId === trade.id}
                onToggle={() => setExpandedId(expandedId === trade.id ? null : trade.id)}
                onNoteChange={(n) => handleNoteChange(trade.id, n)} />
            ))}
          </div>
        </div>

        <div style={{ textAlign: 'center', fontSize: 11, paddingBottom: 8, color: C.inkMuted }}>
          Saved on this device · Add to Home Screen for the full app feel
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Journifi />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
