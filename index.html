function fmtMoney(n) {
  const sign = n < 0 ? '-' : '+';
  return `${sign}$${Math.abs(n).toFixed(2)}`;
}
function fmtPlain(n) { return `$${Math.abs(n).toFixed(2)}`; }

function shortDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[m - 1]} ${d}`;
}

function computeStats(trades) {
  if (trades.length === 0) {
    return { netPnl: 0, winRate: 0, avgWin: 0, avgLoss: 0, profitFactor: 0, total: 0, wins: 0, losses: 0 };
  }
  const wins = trades.filter((t) => t.pnl > 0);
  const losses = trades.filter((t) => t.pnl < 0);
  const netPnl = trades.reduce((s, t) => s + t.pnl, 0);
  const sumWins = wins.reduce((s, t) => s + t.pnl, 0);
  const sumLosses = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
  return {
    netPnl,
    winRate: (wins.length / trades.length) * 100,
    avgWin: wins.length ? sumWins / wins.length : 0,
    avgLoss: losses.length ? sumLosses / losses.length : 0,
    profitFactor: sumLosses ? sumWins / sumLosses : (sumWins > 0 ? Infinity : 0),
    total: trades.length,
    wins: wins.length,
    losses: losses.length,
  };
}

function groupByDate(trades) {
  const map = {};
  trades.forEach((t) => { map[t.date] = (map[t.date] || 0) + t.pnl; });
  return map;
}

function getInsight(stats) {
  if (stats.total === 0) return 'No trades in this period yet.';
  const pf = stats.profitFactor;
  const wr = stats.winRate;
  if (pf < 1 && wr >= 45) {
    return `Win rate is ${wr.toFixed(0)}% — close to a coin flip but solid. The leak is size: average losses (${fmtPlain(stats.avgLoss)}) are running bigger than average wins (${fmtPlain(stats.avgWin)}). The edge here isn't "be right more often," it's cut losers faster or hold winners a bit longer.`;
  }
  if (pf < 1 && wr < 45) {
    return `Both win rate (${wr.toFixed(0)}%) and reward-to-risk are working against you right now. Worth reviewing entries tagged "FOMO Entry" or "Revenge Trade" first — those usually explain more of the drawdown than the setup itself.`;
  }
  if (pf >= 1 && pf < 1.5) {
    return `Profit factor of ${pf.toFixed(2)} — you're net positive. Small, consistent edge. Tightening the worst-tagged trades further could push this meaningfully higher.`;
  }
  return `Profit factor of ${pf.toFixed(2)} with a ${wr.toFixed(0)}% win rate — this is working. Keep tagging trades so you can see exactly which setup is carrying the period.`;
}

function computeBreakdown(trades, getKey) {
  const groups = {};
  trades.forEach((t) => {
    const key = getKey(t);
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });
  return Object.entries(groups)
    .map(([key, ts]) => ({ key, stats: computeStats(ts) }))
    .sort((a, b) => b.stats.netPnl - a.stats.netPnl);
}

function computeStreaks(chronological) {
  if (chronological.length === 0) return { currentType: null, currentCount: 0, longestWin: 0, longestLoss: 0 };
  let longestWin = 0, longestLoss = 0, curWin = 0, curLoss = 0;
  chronological.forEach((t) => {
    if (t.pnl >= 0) { curWin++; curLoss = 0; longestWin = Math.max(longestWin, curWin); }
    else { curLoss++; curWin = 0; longestLoss = Math.max(longestLoss, curLoss); }
  });
  const last = chronological[chronological.length - 1];
  const currentType = last.pnl >= 0 ? 'win' : 'loss';
  const currentCount = currentType === 'win' ? curWin : curLoss;
  return { currentType, currentCount, longestWin, longestLoss };
}

function filterByPeriod(trades, period) {
  if (period === 'all' || trades.length === 0) return trades;
  const mostRecent = new Date(trades[0].date);
  if (period === 'month') {
    const y = mostRecent.getFullYear(), m = mostRecent.getMonth();
    return trades.filter((t) => {
      const d = new Date(t.date);
      return d.getFullYear() === y && d.getMonth() === m;
    });
  }
  if (period === 'week') {
    const cutoff = new Date(mostRecent);
    cutoff.setDate(cutoff.getDate() - 6);
    return trades.filter((t) => {
      const d = new Date(t.date);
      return d >= cutoff && d <= mostRecent;
    });
  }
  return trades;
}

function exportCSV(trades, notes) {
  const header = ['Date', 'Symbol', 'Exit Type', 'PnL', 'Setup', 'Psychology', 'Notes'];
  const rows = trades.map((t) => {
    const n = notes[t.id] || {};
    return [t.date, t.symbol, t.exitType, t.pnl.toFixed(2), n.setup || '', n.psychology || '', (n.text || '').replace(/"/g, '""')];
  });
  const csv = [header, ...rows].map((r) => r.map((c) => `"${String(c)}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `journifi-export-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {

      return {
        notes: d.notes || {},
        customTrades: d.customTrades || [],
        maxLoss: d.maxLoss || MAX_LOSS_DEFAULT,
        checklist: d.checklist || {},
      };
    }
  } catch (e) {}
  return { notes: {}, customTrades: [], maxLoss: MAX_LOSS_DEFAULT, checklist: {} };
}
function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}

function StreakCard({ streaks }) {

  return (
    <Card style={{ flex: 1 }}>

    </Card>

function RuleCard({ trades, maxLoss, onMaxLossChange }) {
  const violations = trades.filter((t) => t.pnl < -Math.abs(maxLoss));
  const totalExcess = violations.reduce((s, t) => s + (Math.abs(t.pnl) - Math.abs(maxLoss)), 0);
  return (
    <Card style={{ flex: 1 }}>
      <div style={{ ...labelStyle, marginBottom: 4 }}>Max Loss Rule</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginBottom: 4 }}>
        <span style={{ fontSize: 13, color: C.inkMuted }}>$</span>
        <input type="number" value={maxLoss} onChange={(e) => onMaxLossChange(Number(e.target.value) || 0)}
          style={{ width: 56, fontSize: 17, fontWeight: 600, fontFamily: "'Fraunces', serif", color: C.ink, background: 'transparent', border: 'none', borderBottom: `1px solid ${C.border}`, padding: 0 }} />
        <span style={{ fontSize: 11, color: C.inkMuted }}>/ trade</span>
      </div>
      {violations.length === 0 ? (
        <div style={{ fontSize: 11, color: C.gain }}>No trades over limit ✓</div>
      ) : (
        <div style={{ fontSize: 11, color: C.loss }}>{violations.length} over · -{fmtPlain(totalExcess)} excess</div>
      )}
    </Card>
  );
}

  const best = trades.reduce((a, b) => (b.pnl > a.pnl ? b : a), trades[0]);

      <div style={{ fontSize: 18, fontWeight: 600, fontFamily: "'Fraunces', serif", color }}>{fmtMoney(trade.pnl)}</div>
      <div style={{ fontSize: 12, color: C.inkMuted, fontFamily: "'IBM Plex Mono', monospace" }}>{trade.symbol} · {shortDate(trade.date)}</div>

  );
  return (
    <div style={{ display: 'flex', gap: 8 }}>
      <Cell label="Best Trade" trade={best} color={C.gain} />
      <Cell label="Worst Trade" trade={worst} color={C.loss} />

}

/* ---------------------------------------------------------------- */
/* Cumulative P&L chart (Chart.js)                                    */
/* ---------------------------------------------------------------- */

function CumulativeChart({ data }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map((d) => d.label),
        datasets: [
          {
            label: 'Cumulative P&L',
            data: data.map((d) => d.cum),
            borderColor: C.gold,
            backgroundColor: hexToRgba(C.gold, 0.1),
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            borderWidth: 2,
          },
          {
            label: 'Zero',
            data: data.map(() => 0),
            borderColor: C.inkMuted,
            borderDash: [4, 4],
            borderWidth: 1,
            pointRadius: 0,
            fill: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: C.surfaceAlt,
            titleColor: C.ink,
            bodyColor: C.ink,
            borderColor: C.border,
            borderWidth: 1,
            callbacks: {
              label: (ctx) => ctx.datasetIndex === 0 ? `Cumulative: ${fmtMoney(ctx.raw)}` : null,
            },
            filter: (ctx) => ctx.datasetIndex === 0,
          },
        },
        scales: {
          x: { ticks: { color: C.inkMuted, font: { size: 10 } }, grid: { color: C.border, drawTicks: false } },
          y: { ticks: { color: C.inkMuted, font: { size: 10 }, callback: (v) => `$${v}` }, grid: { color: C.border, drawTicks: false } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [data]);

  return <div style={{ height: 140 }}><canvas ref={canvasRef}></canvas></div>;
}

/* ---------------------------------------------------------------- */
/* Calendar                                                           */
/* ---------------------------------------------------------------- */

function ProfitCalendar({ dailyPnl }) {
  const [month, setMonth] = useState(new Date(2026, 5, 1));
  const year = month.getFullYear();
  const mIdx = month.getMonth();
  const firstDay = new Date(year, mIdx, 1).getDay();
  const daysInMonth = new Date(year, mIdx + 1, 0).getDate();
  const monthLabel = month.toLocaleString('default', { month: 'long', year: 'numeric' });

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const monthlyTotal = Object.entries(dailyPnl)
    .filter(([date]) => {
      const [y, m] = date.split('-').map(Number);
      return y === year && m - 1 === mIdx;
    })
    .reduce((s, [, v]) => s + v, 0);

  return (
    <Card>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
        <button onClick={() => setMonth(new Date(year, mIdx - 1, 1))} style={{ background: 'transparent', border: 'none', color: C.inkMuted, cursor: 'pointer', fontSize: 18, padding: 4 }}>‹</button>
        <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'Fraunces', serif", color: C.ink }}>{monthLabel}</div>
        <button onClick={() => setMonth(new Date(year, mIdx + 1, 1))} style={{ background: 'transparent', border: 'none', color: C.inkMuted, cursor: 'pointer', fontSize: 18, padding: 4 }}>›</button>
      </div>
      <div style={{ fontSize: 12, marginBottom: 8, color: monthlyTotal >= 0 ? C.gain : C.loss, fontFamily: "'IBM Plex Mono', monospace" }}>
        Month total: {fmtMoney(monthlyTotal)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, textAlign: 'center', fontSize: 10, marginBottom: 4, color: C.inkMuted }}>
        {['S','M','T','W','T','F','S'].map((d, i) => <div key={i}>{d}</div>)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const dateStr = `${year}-${String(mIdx + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const pnl = dailyPnl[dateStr];
          let bg = 'transparent';
          if (pnl !== undefined) {
            const abs = Math.abs(pnl);
            const alpha = abs > 80 ? 0.55 : abs > 20 ? 0.32 : 0.16;
            bg = hexToRgba(pnl >= 0 ? C.gain : C.loss, alpha);
          }
          return (
            <div key={i} style={{ aspectRatio: '1', borderRadius: 4, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: bg, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 10, color: C.inkMuted }}>{d}</div>
              {pnl !== undefined && (
                <div style={{ fontSize: 9, fontWeight: 500, fontFamily: "'IBM Plex Mono', monospace", color: pnl >= 0 ? C.gain : C.loss }}>
                  {pnl >= 0 ? '+' : ''}{Math.round(pnl)}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function AddTradeForm({ onAdd, onClose }) {
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [symbol, setSymbol] = useState('');
  const [pnl, setPnl] = useState('');
  const [exitType, setExitType] = useState('MARKET');

  const submit = () => {
    if (!symbol || pnl === '') return;
    onAdd({ id: `custom-${Date.now()}`, date, symbol: symbol.toUpperCase(), exitType, pnl: parseFloat(pnl) });
    onClose();
  };

  return (
    <div style={{ borderRadius: 8, padding: 12, marginBottom: 12, display: 'flex', flexDirection: 'column', gap: 8, background: C.surfaceAlt, border: `1px solid ${C.border}` }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 14, fontWeight: 600, color: C.ink, fontFamily: "'Fraunces', serif" }}>New trade</span>
        <button onClick={onClose} style={{ background: 'transparent', border: 'none', color: C.inkMuted, cursor: 'pointer', fontSize: 16 }}>×</button>
      </div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        <input type="date" value={date} onChange={(e) => setDate(e.target.value)}
          style={{ fontSize: 14, borderRadius: 4, padding: '6px 8px', flex: 1, minWidth: 110, background: C.surface, color: C.ink, border: `1px solid ${C.border}` }} />
        <input type="text" value={symbol} onChange={(e) => setSymbol(e.target.value)} placeholder="Symbol"
          style={{ fontSize: 14, borderRadius: 4, padding: '6px 8px', width: 80, background: C.surface, color: C.ink, border: `1px solid ${C.border}` }} />
      </div>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
        <input type="number" step="0.01" value={pnl} onChange={(e) => setPnl(e.target.value)} placeholder="P&L (e.g. -45.00)"
          style={{ fontSize: 14, borderRadius: 4, padding: '6px 8px', flex: 1, minWidth: 110, background: C.surface, color: C.ink, border: `1px solid ${C.border}` }} />
        <select value={exitType} onChange={(e) => setExitType(e.target.value)}
          style={{ fontSize: 14, borderRadius: 4, padding: '6px 8px', background: C.surface, color: C.ink, border: `1px solid ${C.border}` }}>
          <option value="MARKET">Market</option>
          <option value="LIMIT">Limit</option>
          <option value="STOP">Stop</option>
          <option value="EXPIRED">Expired</option>
        </select>
      </div>
      <button onClick={submit}
        style={{ fontSize: 14, fontWeight: 600, borderRadius: 4, padding: '8px 0', background: C.gold, color: '#1A1208', border: 'none', cursor: 'pointer' }}>
        Add to journal
      </button>
    </div>
  );
}

function NewsTab({ theme }) {
  const T = THEMES[theme];
  const [articles, setArticles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [activeSymbol, setActiveSymbol] = useState('general');

  const fetchNews = async (symbol) => {
    setLoading(true);
    setError(null);
    try {
      let url;
      if (symbol === 'general') {
        url = `https://finnhub.io/api/v1/news?category=general&token=${FINNHUB_KEY}`;
      } else {
        const to = new Date().toISOString().slice(0, 10);
        const from = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
        url = `https://finnhub.io/api/v1/company-news?symbol=${symbol}&from=${from}&to=${to}&token=${FINNHUB_KEY}`;
      }
      const res = await fetch(url);
      const data = await res.json();
      setArticles((data || []).slice(0, 20));
    } catch (e) {
      setError('Could not load news. Check your connection.');
    }
    setLoading(false);
  };

  useEffect(() => { fetchNews(activeSymbol); }, [activeSymbol]);

  const tabs = ['general', ...WATCHLIST];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      <div style={{ overflowX: 'auto', display: 'flex', gap: 6, paddingBottom: 4, scrollbarWidth: 'none' }}>
        {tabs.map((s) => (
          <button key={s} onClick={() => setActiveSymbol(s)}
            style={{
              flexShrink: 0, padding: '5px 12px', borderRadius: 16, fontSize: 12, cursor: 'pointer',
              fontFamily: "'IBM Plex Mono', monospace", textTransform: 'uppercase', letterSpacing: '0.06em',
              background: activeSymbol === s ? T.gold : T.surfaceAlt,
              color: activeSymbol === s ? '#1A1208' : T.inkMuted,
              border: `1px solid ${activeSymbol === s ? T.gold : T.border}`,
              fontWeight: activeSymbol === s ? 600 : 400,
            }}>
            {s === 'general' ? 'Market' : s}
          </button>
        ))}
      </div>

      {loading && (
        <div style={{ textAlign: 'center', padding: 32, color: T.inkMuted, fontSize: 13 }}>Loading news...</div>
      )}
      {error && (
        <div style={{ textAlign: 'center', padding: 32, color: T.loss, fontSize: 13 }}>{error}</div>
      )}
      {!loading && !error && articles.length === 0 && (
        <div style={{ textAlign: 'center', padding: 32, color: T.inkMuted, fontSize: 13 }}>No recent news found.</div>
      )}
      {!loading && articles.map((a, i) => (
        <a key={i} href={a.url} target="_blank" rel="noopener noreferrer"
          style={{ textDecoration: 'none', display: 'block', borderRadius: 8, padding: 12, background: T.surface, border: `1px solid ${T.border}` }}>
          <div style={{ display: 'flex', gap: 10 }}>
            {a.image ? (
              <img src={a.image} alt="" style={{ width: 64, height: 64, borderRadius: 6, objectFit: 'cover', flexShrink: 0 }}
                onError={(e) => { e.target.style.display = 'none'; }} />
            ) : null}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.ink, lineHeight: 1.35, marginBottom: 4 }}>{a.headline}</div>
              <div style={{ fontSize: 11, color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace" }}>
                {a.source} · {new Date(a.datetime * 1000).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
              </div>
            </div>
          </div>
        </a>
      ))}
    </div>
  );
}

function TickerTab({ theme }) {
  const T = THEMES[theme];
  const [quotes, setQuotes] = useState({});
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const fetchAll = async () => {
      setLoading(true);
      const results = {};
      await Promise.all(WATCHLIST.map(async (sym) => {
        try {
          const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_KEY}`);
          const d = await res.json();
          results[sym] = d;
        } catch(e) {}
      }));
      setQuotes(results);
      setLoading(false);
    };
    fetchAll();
    const interval = setInterval(fetchAll, 30000);
    return () => clearInterval(interval);
  }, []);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div style={{ fontSize: 11, color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace", textTransform: 'uppercase', letterSpacing: '0.08em' }}>
        Live Quotes · refreshes every 30s
      </div>
      {loading ? (
        <div style={{ textAlign: 'center', padding: 32, color: T.inkMuted, fontSize: 13 }}>Loading quotes...</div>
      ) : (
        WATCHLIST.map((sym) => {
          const q = quotes[sym] || {};
          const change = q.d || 0;
          const changePct = q.dp || 0;
          const gain = change >= 0;
          return (
            <div key={sym} style={{ borderRadius: 8, padding: '10px 12px', background: T.surface, border: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: T.ink, fontFamily: "'IBM Plex Sans', sans-serif" }}>{sym}</div>
                <div style={{ fontSize: 11, color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace" }}>
                  O: ${(q.o||0).toFixed(2)} · H: ${(q.h||0).toFixed(2)} · L: ${(q.l||0).toFixed(2)}
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontWeight: 700, fontSize: 17, fontFamily: "'Fraunces', serif", color: T.ink }}>${(q.c||0).toFixed(2)}</div>
                <div style={{ fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", color: gain ? T.gain : T.loss }}>
                  {gain ? '+' : ''}{change.toFixed(2)} ({gain ? '+' : ''}{changePct.toFixed(2)}%)
                </div>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

/* Market Hub Tab (Movers + Calendar + Options Flow)                  */

function MarketTab({ theme }) {
  const T = THEMES[theme];
  const [section, setSection] = useState('movers');
  const [movers, setMovers] = useState([]);
  const [calendar, setCalendar] = useState([]);
  const [optionsFlow, setOptionsFlow] = useState([]);
  const [loading, setLoading] = useState(false);

  const fetchMovers = async () => {
    setLoading(true);
    try {
      // Use market news with IPO/earnings as proxy; fetch quotes for watchlist and sort by % change
      const results = await Promise.all(WATCHLIST.map(async (sym) => {
        const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_KEY}`);
        const d = await res.json();
        return { sym, ...d };
      }));
      results.sort((a, b) => Math.abs(b.dp || 0) - Math.abs(a.dp || 0));
      setMovers(results);
    } catch(e) {}
    setLoading(false);
  };

  const fetchCalendar = async () => {
    setLoading(true);
    try {
      const from = new Date().toISOString().slice(0, 10);
      const to = new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
      const res = await fetch(`https://finnhub.io/api/v1/calendar/earnings?from=${from}&to=${to}&token=${FINNHUB_KEY}`);
      const d = await res.json();
      const items = (d.earningsCalendar || []).filter(e => WATCHLIST.includes(e.symbol)).slice(0, 20);
      setCalendar(items);
    } catch(e) {}
    setLoading(false);
  };

  const fetchOptionsFlow = async () => {
    setLoading(true);
    try {
      // Use Finnhub market news filtered to options/unusual activity as proxy
      const allNews = await Promise.all(['AMD','SPY','META','NVDA','TSLA'].map(async (sym) => {
        const to = new Date().toISOString().slice(0, 10);
        const from = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
        const res = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
        const d = await res.json();
        return (d || []).slice(0, 3).map(a => ({ ...a, symbol: sym }));
      }));
      setOptionsFlow(allNews.flat().sort((a, b) => b.datetime - a.datetime).slice(0, 15));
    } catch(e) {}
    setLoading(false);
  };

  useEffect(() => {
    if (section === 'movers') fetchMovers();
    else if (section === 'calendar') fetchCalendar();
    else if (section === 'flow') fetchOptionsFlow();
  }, [section]);

  const sections = [
    { id: 'movers', label: 'Movers' },
    { id: 'calendar', label: 'Earnings' },
    { id: 'flow', label: 'News Flow' },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      <div style={{ display: 'flex', borderRadius: 8, border: `1px solid ${T.border}`, overflow: 'hidden' }}>
        {sections.map((s) => (
          <button key={s.id} onClick={() => setSection(s.id)}
            style={{
              flex: 1, padding: '8px 0', fontSize: 12, fontFamily: "'IBM Plex Mono', monospace",
              textTransform: 'uppercase', letterSpacing: '0.06em', border: 'none', cursor: 'pointer',
              background: section === s.id ? hexToRgba(T.gold, 0.15) : 'transparent',
              color: section === s.id ? T.gold : T.inkMuted,
            }}>
            {s.label}
          </button>
        ))}
      </div>

      {loading && <div style={{ textAlign: 'center', padding: 32, color: T.inkMuted, fontSize: 13 }}>Loading...</div>}

      {!loading && section === 'movers' && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <div style={{ fontSize: 11, color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace", textTransform: 'uppercase' }}>Watchlist sorted by % move today</div>
          {movers.map(({ sym, c, dp, d }) => {
            const gain = (dp || 0) >= 0;
            return (
              <div key={sym} style={{ borderRadius: 8, padding: '10px 12px', background: T.surface, border: `1px solid ${T.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ fontWeight: 700, fontSize: 15, color: T.ink }}>{sym}</div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontWeight: 600, fontSize: 15, color: T.ink, fontFamily: "'Fraunces', serif" }}>${(c||0).toFixed(2)}</div>
                  <div style={{ fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", color: gain ? T.gain : T.loss }}>
                    {gain ? '+' : ''}{(dp||0).toFixed(2)}%
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {!loading && section === 'calendar' && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <div style={{ fontSize: 11, color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace", textTransform: 'uppercase' }}>Upcoming earnings — next 14 days</div>
          {calendar.length === 0 && <div style={{ fontSize: 13, color: T.inkMuted, padding: '12px 0' }}>No earnings for your watchlist in next 14 days.</div>}

              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: T.ink }}>{e.symbol}</div>

              </div>
            </div>
          ))}
        </div>
      )}

      {!loading && section === 'flow' && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ fontSize: 11, color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace", textTransform: 'uppercase' }}>Recent news flow — AMD, SPY, META, NVDA, TSLA</div>
          {optionsFlow.map((a, i) => (
            <a key={i} href={a.url} target="_blank" rel="noopener noreferrer"
              style={{ textDecoration: 'none', display: 'block', borderRadius: 8, padding: 12, background: T.surface, border: `1px solid ${T.border}` }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: T.gold, fontFamily: "'IBM Plex Mono', monospace" }}>{a.symbol}</span>
                <span style={{ fontSize: 10, color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace" }}>{new Date(a.datetime * 1000).toLocaleDateString('en-CA', { month: 'short', day: 'numeric' })}</span>
              </div>
              <div style={{ fontSize: 13, color: T.ink, lineHeight: 1.35 }}>{a.headline}</div>
              <div style={{ fontSize: 11, color: T.inkMuted, marginTop: 4 }}>{a.source}</div>
            </a>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------- */
/* Goal Tracker (injected into journal tab)                           */
/* ---------------------------------------------------------------- */

function GoalTracker({ theme, trades, notes }) {
  const T = THEMES[theme];
  const [dailyGoal, setDailyGoal] = useState(() => Number(localStorage.getItem('journifi-goal') || 100));
  const todayKey = new Date().toISOString().slice(0, 10);
  const todayTrades = trades.filter(t => t.date === todayKey);
  const todayPnl = todayTrades.reduce((s, t) => s + t.pnl, 0);
  const pct = Math.min(100, Math.max(0, (todayPnl / dailyGoal) * 100));
  const hit = todayPnl >= dailyGoal;

  const handleGoalChange = (val) => {
    setDailyGoal(val);
    localStorage.setItem('journifi-goal', val);
  };

  return (
    <div style={{ borderRadius: 8, padding: 12, background: T.surface, border: `1px solid ${hit ? hexToRgba(T.gain, 0.5) : T.border}` }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace" }}>
          Daily Goal {hit ? '✓ HIT' : ''}
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 3 }}>
          <span style={{ fontSize: 11, color: T.inkMuted }}>$</span>
          <input type="number" value={dailyGoal} onChange={(e) => handleGoalChange(Number(e.target.value) || 0)}
            style={{ width: 52, fontSize: 14, fontWeight: 600, fontFamily: "'Fraunces', serif", color: T.ink, background: 'transparent', border: 'none', borderBottom: `1px solid ${T.border}`, padding: 0, textAlign: 'right' }} />
          <span style={{ fontSize: 11, color: T.inkMuted }}>/day</span>
        </div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
        <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Fraunces', serif", color: todayPnl >= 0 ? T.gain : T.loss }}>
          {todayPnl >= 0 ? '+' : '-'}${Math.abs(todayPnl).toFixed(2)}
        </div>
        <div style={{ fontSize: 12, color: T.inkMuted, fontFamily: "'IBM Plex Mono', monospace" }}>
          {pct.toFixed(0)}% of goal
        </div>
      </div>
      <div style={{ borderRadius: 4, height: 8, background: T.border, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${pct}%`, background: hit ? T.gain : T.gold, borderRadius: 4, transition: 'width 0.4s ease' }} />
      </div>
      {todayTrades.length === 0 && (
        <div style={{ fontSize: 11, color: T.inkMuted, marginTop: 6 }}>No trades logged today yet.</div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------- */
/* Main App                                                           */
/* ---------------------------------------------------------------- */

function Journifi() {
  const [notes, setNotes] = useState({});
  const [customTrades, setCustomTrades] = useState([]);
  const [expandedId, setExpandedId] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [period, setPeriod] = useState('all');
  const [maxLoss, setMaxLoss] = useState(MAX_LOSS_DEFAULT);
  const [checklist, setChecklist] = useState({});
  const [theme, setTheme] = useState(() => localStorage.getItem('journifi-theme') || 'dark');
  const [activeTab, setActiveTab] = useState('journal');

  C = THEMES[theme];

  const toggleTheme = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
    localStorage.setItem('journifi-theme', next);
  };

  useEffect(() => {
    document.body.style.background = THEMES[theme].bg;
  }, [theme]);

  useEffect(() => {
    const data = loadData();
    setNotes(data.notes);
    setCustomTrades(data.customTrades);
    setMaxLoss(data.maxLoss);
    setChecklist(data.checklist);
  }, []);

  const allTrades = useMemo(() => {
    return [...SEED_TRADES, ...customTrades].sort((a, b) => (a.date < b.date ? 1 : -1));
  }, [customTrades]);

  const filteredTrades = useMemo(() => filterByPeriod(allTrades, period), [allTrades, period]);
  const stats = useMemo(() => computeStats(filteredTrades), [filteredTrades]);
  const dailyPnl = useMemo(() => groupByDate(allTrades), [allTrades]);
  const streaks = useMemo(() => computeStreaks([...allTrades].reverse()), [allTrades]);
  const symbolBreakdown = useMemo(() => computeBreakdown(filteredTrades, (t) => t.symbol), [filteredTrades]);
  const setupBreakdown = useMemo(() => computeBreakdown(filteredTrades, (t) => (notes[t.id] || {}).setup), [filteredTrades, notes]);
  const psychBreakdown = useMemo(() => computeBreakdown(filteredTrades, (t) => (notes[t.id] || {}).psychology), [filteredTrades, notes]);

  const chartData = useMemo(() => {
    const map = groupByDate(filteredTrades);
    const dates = Object.keys(map).sort();
    let cum = 0;
    return dates.map((d) => {
      cum += map[d];
      return { date: d, label: shortDate(d), cum: Math.round(cum * 100) / 100 };
    });
  }, [filteredTrades]);

  const todayKey = new Date().toISOString().slice(0, 10);

  const handleNoteChange = (tradeId, nextNote) => {
    const nextNotes = { ...notes, [tradeId]: nextNote };
    setNotes(nextNotes);
    saveData({ notes: nextNotes, customTrades, maxLoss, checklist });
  };

  const handleAddTrade = (trade) => {
    const next = [...customTrades, trade];
    setCustomTrades(next);
    saveData({ notes, customTrades: next, maxLoss, checklist });
  };

  const handleMaxLossChange = (val) => {
    setMaxLoss(val);
    saveData({ notes, customTrades, maxLoss: val, checklist });
  };

  const handleChecklistToggle = (idx) => {
    const dayChecks = { ...(checklist[todayKey] || {}) };
    dayChecks[idx] = !dayChecks[idx];
    const nextChecklist = { ...checklist, [todayKey]: dayChecks };
    setChecklist(nextChecklist);
    saveData({ notes, customTrades, maxLoss, checklist: nextChecklist });
  };

  const range = allTrades.length
    ? `${shortDate(allTrades[allTrades.length - 1].date)} – ${shortDate(allTrades[0].date)}, 2026`
    : '';

  const btnStyle = {
    display: 'flex', alignItems: 'center', gap: 4, fontSize: 11, textTransform: 'uppercase',
    letterSpacing: '0.08em', background: 'transparent', border: 'none', cursor: 'pointer',
    fontFamily: "'IBM Plex Mono', monospace",
  };

  return (
    <div style={{ minHeight: '100vh', width: '100%', background: THEMES[theme].bg, fontFamily: "'IBM Plex Sans', sans-serif" }}>
      <div style={{ maxWidth: 480, margin: '0 auto', padding: '24px 16px', display: 'flex', flexDirection: 'column', gap: 16 }}>

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <CandleIcon />
            <div>
              <div style={{ fontSize: 26, fontWeight: 700, lineHeight: 1.1, fontFamily: "'Fraunces', serif", color: C.ink }}>Journifi</div>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.12em', color: C.gold, fontFamily: "'IBM Plex Mono', monospace" }}>
                Personal Trade Journal · {range}
              </div>
            </div>
          </div>
          <button onClick={toggleTheme} title="Toggle theme"
            style={{ background: C.surfaceAlt, border: `1px solid ${C.border}`, borderRadius: 20, padding: '6px 12px', cursor: 'pointer', fontSize: 14, color: C.inkMuted }}>
            {theme === 'dark' ? '☀️' : '🌙'}
          </button>
        </div>

        {activeTab === 'journal' && <>
        <SegmentToggle value={period} onChange={setPeriod} options={[
          { value: 'all', label: 'All' },
          { value: 'month', label: 'This Month' },
          { value: 'week', label: 'This Week' },
        ]} />

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          <StatCard label="Net P&L" value={fmtMoney(stats.netPnl)} valueColor={stats.netPnl >= 0 ? C.gain : C.loss} glyph={stats.netPnl >= 0 ? '↑' : '↓'} sub={`${stats.total} trades`} />
          <StatCard label="Win Rate" value={`${stats.winRate.toFixed(0)}%`} glyph="◎" sub={`${stats.wins}W / ${stats.losses}L`} />
          <StatCard label="Avg Win" value={fmtPlain(stats.avgWin)} valueColor={C.gain} glyph="↑" />
          <StatCard label="Avg Loss" value={fmtPlain(stats.avgLoss)} valueColor={C.loss} glyph="↓" />
          <StatCard label="Profit Factor" value={isFinite(stats.profitFactor) ? stats.profitFactor.toFixed(2) : '∞'} glyph="⚖" />
          <StatCard label="Total Trades" value={stats.total} glyph="#" />
        </div>

        <div style={{ display: 'flex', gap: 8 }}>
          <StreakCard streaks={streaks} />
          <RuleCard trades={filteredTrades} maxLoss={maxLoss} onMaxLossChange={handleMaxLossChange} />
        </div>

        <div style={{ borderRadius: 8, padding: 12, display: 'flex', gap: 8, background: hexToRgba(C.gold, 0.08), border: `1px solid ${hexToRgba(C.gold, 0.3)}` }}>
          <span style={{ color: C.gold, flexShrink: 0 }}>📓</span>
          <div style={{ fontSize: 13, lineHeight: 1.4, color: C.ink }}>{getInsight(stats)}</div>
        </div>

        <GoalTracker theme={theme} trades={allTrades} notes={notes} />

        <BestWorstRow trades={filteredTrades} />

        <Card>
          <div style={{ ...labelStyle, marginBottom: 8 }}>Cumulative P&L</div>
          <CumulativeChart data={chartData} />
        </Card>

        <ProfitCalendar dailyPnl={dailyPnl} />

        <BreakdownTable title="By Symbol" rows={symbolBreakdown} emptyText="No trades in this period." />
        <BreakdownTable title="By Setup" rows={setupBreakdown} emptyText="Tag trades with a setup to see this breakdown." />
        <BreakdownTable title="By Psychology" rows={psychBreakdown} emptyText="Tag trades with a psychology state to see this breakdown." />

        <ChecklistCard checked={checklist[todayKey] || {}} onToggle={handleChecklistToggle} dateLabel={shortDate(todayKey)} />

        <Card>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
            <div style={labelStyle}>Trade Log</div>
            <div style={{ display: 'flex', gap: 16 }}>
              <button onClick={() => exportCSV(filteredTrades, notes)} style={{ ...btnStyle, color: C.inkMuted }}>Export CSV</button>
              <button onClick={() => setShowAddForm((s) => !s)} style={{ ...btnStyle, color: C.gold }}>+ Add</button>
            </div>
          </div>
          {showAddForm && <AddTradeForm onAdd={handleAddTrade} onClose={() => setShowAddForm(false)} />}
          <div>
            {filteredTrades.map((trade) => (
              <TradeRow key={trade.id} trade={trade} note={notes[trade.id]} maxLoss={maxLoss}
                expanded={expandedId === trade.id}
                onToggle={() => setExpandedId(expandedId === trade.id ? null : trade.id)}
                onNoteChange={(n) => handleNoteChange(trade.id, n)} />
            ))}
            {filteredTrades.length === 0 && <div style={{ fontSize: 12, color: C.inkMuted, padding: '12px 0' }}>No trades in this period.</div>}
          </div>
        </Card>

        </>
        }

        {activeTab === 'ticker' && <TickerTab theme={theme} />}
        {activeTab === 'market' && <MarketTab theme={theme} />}
        {activeTab === 'news' && <NewsTab theme={theme} />}

        <div style={{ textAlign: 'center', fontSize: 11, paddingBottom: 72, color: C.inkMuted }}>
          {activeTab === 'journal' ? 'Saved on this device' : ''}
        </div>
      </div>

      {/* Bottom Tab Bar */}
      <div style={{
        position: 'fixed', bottom: 0, left: 0, right: 0,
        background: THEMES[theme].surface, borderTop: `1px solid ${THEMES[theme].border}`,
        display: 'flex', paddingBottom: 'env(safe-area-inset-bottom)',
        zIndex: 100,
      }}>
        {[
          { id: 'journal', label: 'Journal', icon: '📒' },
          { id: 'ticker', label: 'Quotes', icon: '📈' },
          { id: 'market', label: 'Market', icon: '🌐' },
          { id: 'news', label: 'News', icon: '📰' },
        ].map((tab) => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            style={{
              flex: 1, padding: '10px 0', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
              background: 'transparent', border: 'none', cursor: 'pointer',
              color: activeTab === tab.id ? THEMES[theme].gold : THEMES[theme].inkMuted,
            }}>
            <span style={{ fontSize: 20 }}>{tab.icon}</span>
            <span style={{ fontSize: 10, fontFamily: "'IBM Plex Mono', monospace", textTransform: 'uppercase', letterSpacing: '0.06em' }}>{tab.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Journifi />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
